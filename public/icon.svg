<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Solid dark background — iOS applies its own rounded corners on top -->
  <rect width="1024" height="1024" fill="#060b14"/>
  <!--
    Lucide flame path (24x24 coords), scaled and centered.
    Flame bounding box ≈ x[5,19] × y[3,22] → 14×19 units.
    Scale 33: flame becomes 462×627 px → fills ~61 % of height, ~45 % of width.
    Translate: tx=116, ty=100 centres the flame in the 1024×1024 canvas.
  -->
  <path
    transform="translate(116, 100) scale(33)"
    d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"
    fill="#f5a623"
  />
</svg>
